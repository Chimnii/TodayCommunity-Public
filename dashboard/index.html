<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="커뮤니티에서 기준을 통과한 글만 모아보는 TodayCommunity 선별 글 아카이브"
    />
    <title>오늘의 커뮤니티 | 선별 글 아카이브</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#archive-board">게시글 목록으로 건너뛰기</a>

    <main class="page-shell">
      <header class="masthead">
        <div class="masthead-copy">
          <h1><a class="masthead-home" href="/">오늘의 커뮤니티</a></h1>
          <p id="source-description">
            추천수 또는 댓글수가 일정 조건을 만족하는 글을 모읍니다. 본문 내용은 수집하지 않고
            제목과 원문 링크 등 목록 정보만 수집합니다.
          </p>
        </div>

        <div class="masthead-tools">
          <div class="archive-summary" id="summary" aria-live="polite">
            <span><strong id="summary-total">-</strong>개 저장</span>
            <span>최근 갱신 <strong id="summary-latest">확인 중</strong></span>
          </div>
          <button
            class="button button-secondary"
            id="runs-open"
            type="button"
            aria-controls="runs-drawer"
            aria-expanded="false"
          >
            수집 기록
            <span class="button-count" id="run-count">0</span>
          </button>
        </div>
      </header>

      <nav class="archive-navigation" aria-label="아카이브 선택">
        <div class="archive-tabs" id="archive-tabs" role="tablist" aria-label="커뮤니티 아카이브">
          <a
            class="archive-tab"
            role="tab"
            aria-selected="true"
            aria-controls="archive-board"
            href="/?target=dcinside-singularity"
          >특이점이 온다 갤</a>
          <a
            class="archive-tab"
            role="tab"
            aria-selected="false"
            aria-controls="archive-board"
            tabindex="-1"
            href="/?target=dcinside-agent-stack"
          >AI 활용 갤</a>
          <a
            class="archive-tab"
            role="tab"
            aria-selected="false"
            aria-controls="archive-board"
            tabindex="-1"
            href="/?target=fmkorea-munich"
          >뮌헨 소식 (펨코)</a>
        </div>
      </nav>

      <section class="archive-section" aria-labelledby="archive-title">
        <div class="archive-heading">
          <div>
            <h2 id="archive-title" tabindex="-1">선별 글 아카이브</h2>
            <p id="result-count" aria-live="polite">목록을 불러오는 중입니다.</p>
          </div>
        </div>

        <div class="filter-shell" id="filter-shell">
          <button
            class="filter-toggle"
            id="filter-toggle"
            type="button"
            aria-controls="filter-form"
            aria-expanded="false"
          >
            <span>검색·필터</span>
            <span class="filter-toggle-state">펼치기</span>
          </button>

          <form class="filter-form" id="filter-form">
            <label class="filter-control filter-search">
              <span>제목 검색</span>
              <input
                id="search-input"
                name="q"
                type="search"
                maxlength="100"
                placeholder="찾을 제목을 입력하세요"
                autocomplete="off"
              />
            </label>

            <label class="filter-control">
              <span>말머리</span>
              <select id="subject-select" name="subject">
                <option value="">전체 말머리</option>
              </select>
            </label>

            <label class="filter-control">
              <span>최소 추천</span>
              <input id="upvotes-input" name="min_upvotes" type="number" min="0" value="0" />
            </label>

            <label class="filter-control">
              <span>최소 댓글</span>
              <input id="comments-input" name="min_comments" type="number" min="0" value="0" />
            </label>

            <label class="filter-control">
              <span>정렬</span>
              <select id="sort-select" name="sort">
                <option value="created_at">최신순</option>
                <option value="upvotes">추천순</option>
                <option value="comments">댓글순</option>
              </select>
            </label>

            <label class="filter-control">
              <span>한 페이지</span>
              <select id="page-size-select" name="page_size">
                <option value="20">20개</option>
                <option value="30" selected>30개</option>
                <option value="50">50개</option>
                <option value="100">100개</option>
              </select>
            </label>

            <button class="button button-secondary filter-reset" id="filter-reset" type="reset">
              초기화
            </button>
          </form>

          <p class="data-notice" id="data-notice" role="status" hidden></p>
        </div>

        <div class="board-shell">
          <div
            class="board-table"
            id="archive-board"
            role="table"
            aria-label="저장된 커뮤니티 글"
            aria-busy="true"
          >
            <div class="board-head" role="rowgroup">
              <div class="board-row" role="row">
                <span class="board-cell cell-number" role="columnheader">번호</span>
                <span class="board-cell cell-subject" role="columnheader">말머리</span>
                <span class="board-cell cell-title" role="columnheader">제목</span>
                <span class="board-cell cell-upvotes" role="columnheader">추천</span>
                <span class="board-cell cell-date" role="columnheader">작성일</span>
              </div>
            </div>

            <div class="board-body" id="posts" role="rowgroup" style="--reserved-row-count: 30">
              <div class="board-state" role="row">
                <span role="cell">게시글을 불러오는 중입니다.</span>
              </div>
            </div>
          </div>

          <footer class="board-footer">
            <p id="range-summary">표시 범위를 계산하는 중입니다.</p>
            <nav class="pagination" id="pagination" aria-label="게시글 페이지"></nav>
          </footer>
        </div>
      </section>
    </main>

    <dialog class="runs-drawer" id="runs-drawer" aria-labelledby="runs-title">
      <div class="drawer-content">
        <header class="drawer-header">
          <div>
            <h2 id="runs-title">최근 수집 실행</h2>
            <p>최근 10회의 상태와 처리량입니다.</p>
          </div>
          <button class="icon-button" id="runs-close" type="button" aria-label="수집 기록 닫기">
            <span aria-hidden="true">×</span>
          </button>
        </header>
        <div class="runs-list" id="runs"></div>
      </div>
    </dialog>

    <noscript>
      <p class="noscript-notice">이 페이지의 목록과 필터를 사용하려면 JavaScript가 필요합니다.</p>
    </noscript>

    <script src="./data/archive-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>

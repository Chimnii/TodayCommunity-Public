name: Run DC Hot crawl

on:
  workflow_dispatch:
    inputs:
      hot_lookback_minutes:
        description: "Singularity lookback for this Hot run only (15-1440 minutes)"
        required: false
        default: 180
        type: number
      hot_source_minutes:
        description: "Singularity scan budget for this Hot run only (1-10 minutes)"
        required: false
        default: 3
        type: number

permissions:
  actions: read
  contents: read

concurrency:
  group: scan-dcinside
  cancel-in-progress: false

jobs:
  hot:
    name: DC Hot crawl attempt
    continue-on-error: true
    runs-on: ubuntu-latest
    environment: collection
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Validate Hot settings
        env:
          HOT_LOOKBACK_MINUTES: ${{ inputs.hot_lookback_minutes }}
          HOT_SOURCE_MINUTES: ${{ inputs.hot_source_minutes }}
        run: |
          python - <<'PY'
          import os

          def integer_input(name: str, minimum: int, maximum: int) -> int:
              raw = os.environ[name]
              try:
                  numeric = float(raw)
              except ValueError as exc:
                  raise SystemExit(f"{name.lower()} must be a number") from exc
              if not numeric.is_integer() or not minimum <= numeric <= maximum:
                  raise SystemExit(
                      f"{name.lower()} must be an integer from {minimum} to {maximum}"
                  )
              return int(numeric)

          lookback_minutes = integer_input("HOT_LOOKBACK_MINUTES", 15, 1440)
          source_minutes = integer_input("HOT_SOURCE_MINUTES", 1, 10)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"TC_HOT_LOOKBACK_MINUTES={lookback_minutes}\n")
              env_file.write(f"TC_HOT_MAX_SECONDS={source_minutes * 60}\n")
              env_file.write(f"TC_CYCLE_MAX_SECONDS={source_minutes * 60}\n")
          print(
              f"Hot settings for this run: lookback={lookback_minutes} minutes, "
              f"source budget={source_minutes} minutes"
          )
          PY

      - name: Verify D1 schema
        env:
          TC_CF_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
          TC_CF_DATABASE_ID: ${{ secrets.TC_CF_DATABASE_ID }}
          TC_CF_API_TOKEN: ${{ secrets.TC_CF_API_TOKEN }}
        run: python -m crawler.jobs.check_schema

      - name: Run scheduled DC Hot crawl
        env:
          TC_CF_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
          TC_CF_DATABASE_ID: ${{ secrets.TC_CF_DATABASE_ID }}
          TC_CF_API_TOKEN: ${{ secrets.TC_CF_API_TOKEN }}
          TC_PERSIST: "1"
          TC_FINALIZATION_AGE_HOURS: "12"
          TC_REQUEST_INTERVAL_SECONDS: "10"
          TC_DEEP_RESERVED_SECONDS: "0"
          TC_BLOCK_COOLDOWN_HOURS: "6"
          TC_TRANSIENT_FETCH_ATTEMPTS: "2"
        run: python -m crawler.jobs.run_all_sources --mode hot --persist

      - name: "Failure streak: counted success"
        run: echo "DC Hot crawl attempt completed successfully."

  failure-streak-gate:
    name: DC Hot failure streak gate
    if: always()
    needs: hot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout failure streak helper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Enforce DC Hot failure streak
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TC_FAILURE_STREAK_ATTEMPT_JOB: DC Hot crawl attempt
          TC_FAILURE_STREAK_GATE_JOB: DC Hot failure streak gate
          TC_FAILURE_STREAK_LANE: DC Hot
        run: python3 -m crawler.jobs.enforce_failure_streak

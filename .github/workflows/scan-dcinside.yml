name: Run DCInside Hot crawl

on:
  workflow_dispatch:
    inputs:
      hot_lookback_minutes:
        description: "Publication-age lookback for this Hot run only (15-1440 minutes)"
        required: false
        default: 180
        type: number

permissions:
  contents: read

concurrency:
  group: scan-dcinside
  cancel-in-progress: false

jobs:
  hot:
    runs-on: ubuntu-latest
    environment: collection
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Validate Hot settings
        env:
          HOT_LOOKBACK_MINUTES: ${{ inputs.hot_lookback_minutes }}
        run: |
          python - <<'PY'
          import os

          raw = os.environ["HOT_LOOKBACK_MINUTES"]
          try:
              numeric = float(raw)
          except ValueError as exc:
              raise SystemExit("hot_lookback_minutes must be a number") from exc
          if not numeric.is_integer() or not 15 <= numeric <= 1440:
              raise SystemExit(
                  "hot_lookback_minutes must be an integer from 15 to 1440"
              )
          print(f"Hot lookback for this run: {int(numeric)} minutes")
          PY

      - name: Run Hot crawl
        env:
          TC_CF_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
          TC_CF_DATABASE_ID: ${{ secrets.TC_CF_DATABASE_ID }}
          TC_CF_API_TOKEN: ${{ secrets.TC_CF_API_TOKEN }}
          TC_PERSIST: "1"
          TC_FINALIZATION_AGE_HOURS: "12"
          TC_HOT_LOOKBACK_MINUTES: ${{ inputs.hot_lookback_minutes }}
          TC_HOT_MAX_SECONDS: "180"
          TC_CYCLE_MAX_SECONDS: "180"
          TC_REQUEST_INTERVAL_SECONDS: "10"
          TC_DEEP_RESERVED_SECONDS: "0"
          TC_BLOCK_COOLDOWN_HOURS: "6"
          TC_TRANSIENT_FETCH_ATTEMPTS: "2"
        run: python -m crawler.jobs.run_cycle --mode hot --target dcinside-singularity --persist

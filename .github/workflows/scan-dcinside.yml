name: Run DC Hot crawl

on:
  workflow_dispatch:
    inputs:
      hot_lookback_minutes:
        description: "Singularity lookback for this Hot run only (15-1440 minutes)"
        required: false
        default: 180
        type: number
      hot_source_minutes:
        description: "Singularity scan budget for this Hot run only (1-10 minutes)"
        required: false
        default: 3
        type: number
      fmkorea_browser_smoke:
        description: "Run a secretless one-page FMKorea Chrome smoke instead of DC Hot"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: scan-dcinside
  cancel-in-progress: false

jobs:
  hot:
    if: ${{ inputs.fmkorea_browser_smoke != true }}
    runs-on: ubuntu-latest
    environment: collection
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Validate Hot settings
        env:
          HOT_LOOKBACK_MINUTES: ${{ inputs.hot_lookback_minutes }}
          HOT_SOURCE_MINUTES: ${{ inputs.hot_source_minutes }}
        run: |
          python - <<'PY'
          import os

          def integer_input(name: str, minimum: int, maximum: int) -> int:
              raw = os.environ[name]
              try:
                  numeric = float(raw)
              except ValueError as exc:
                  raise SystemExit(f"{name.lower()} must be a number") from exc
              if not numeric.is_integer() or not minimum <= numeric <= maximum:
                  raise SystemExit(
                      f"{name.lower()} must be an integer from {minimum} to {maximum}"
                  )
              return int(numeric)

          lookback_minutes = integer_input("HOT_LOOKBACK_MINUTES", 15, 1440)
          source_minutes = integer_input("HOT_SOURCE_MINUTES", 1, 10)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"TC_HOT_LOOKBACK_MINUTES={lookback_minutes}\n")
              env_file.write(f"TC_HOT_MAX_SECONDS={source_minutes * 60}\n")
              env_file.write(f"TC_CYCLE_MAX_SECONDS={source_minutes * 60}\n")
          print(
              f"Hot settings for this run: lookback={lookback_minutes} minutes, "
              f"source budget={source_minutes} minutes"
          )
          PY

      - name: Verify D1 schema
        env:
          TC_CF_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
          TC_CF_DATABASE_ID: ${{ secrets.TC_CF_DATABASE_ID }}
          TC_CF_API_TOKEN: ${{ secrets.TC_CF_API_TOKEN }}
        run: python -m crawler.jobs.check_schema

      - name: Run scheduled DC Hot crawl
        env:
          TC_CF_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
          TC_CF_DATABASE_ID: ${{ secrets.TC_CF_DATABASE_ID }}
          TC_CF_API_TOKEN: ${{ secrets.TC_CF_API_TOKEN }}
          TC_PERSIST: "1"
          TC_FINALIZATION_AGE_HOURS: "12"
          TC_REQUEST_INTERVAL_SECONDS: "10"
          TC_DEEP_RESERVED_SECONDS: "0"
          TC_BLOCK_COOLDOWN_HOURS: "6"
          TC_TRANSIENT_FETCH_ATTEMPTS: "2"
        run: python -m crawler.jobs.run_all_sources --mode hot --persist

  fm-browser-smoke:
    if: ${{ inputs.fmkorea_browser_smoke == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install Playwright transport only
        run: python -m pip install --disable-pip-version-check -r crawler/requirements-fmkorea-browser.txt

      - name: Locate installed Google Chrome
        shell: bash
        run: |
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || true)"
          if [[ -z "$chrome_path" || ! -x "$chrome_path" ]]; then
            echo "Installed Google Chrome was not found on this runner." >&2
            exit 1
          fi
          "$chrome_path" --version
          echo "TC_FMKOREA_CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
          echo "TC_FMKOREA_PROFILE_DIR=$RUNNER_TEMP/todaycommunity-fmkorea-profile" >> "$GITHUB_ENV"

      - name: Run secretless FMKorea browser smoke
        env:
          TC_PERSIST: "0"
          TC_FMKOREA_HEADLESS: "1"
          TC_FMKOREA_STARTUP_TIMEOUT_SECONDS: "30"
          TC_FMKOREA_REQUEST_INTERVAL_SECONDS: "10"
        run: >-
          python -m crawler.jobs.run_fmkorea_sources
          --mode hot --headless --max-pages-per-target 1

name: Deploy Cloudflare Scheduler

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-scheduler
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Deploy Scheduler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
        run: npx --yes wrangler@4.112.0 deploy --config scheduler/wrangler.jsonc

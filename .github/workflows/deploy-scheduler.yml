name: Deploy Cloudflare Scheduler

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scheduler/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-scheduler.yml"

permissions:
  contents: read

concurrency:
  # A cutover-specific group prevents a malformed legacy queued run from
  # blocking the current deployment definition.
  group: deploy-scheduler-2026-07-cutover
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install locked deployment tooling
        run: npm ci --ignore-scripts

      - name: Verify Scheduler
        run: node --test tests/scheduler_worker.test.mjs

      - name: Verify Scheduler bundle
        run: ./node_modules/.bin/wrangler deploy --dry-run --config scheduler/wrangler.jsonc

      - name: Deploy Scheduler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_SCHEDULER_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
        run: ./node_modules/.bin/wrangler deploy --config scheduler/wrangler.jsonc

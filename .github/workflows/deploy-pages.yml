name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "dashboard/**"
      - "functions/**"

permissions:
  contents: read

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install locked deployment tooling
        run: npm ci --ignore-scripts

      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
        run: ./node_modules/.bin/wrangler pages deploy dashboard --project-name todaycommunity --branch main --commit-hash $GITHUB_SHA

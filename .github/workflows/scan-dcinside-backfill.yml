name: Run DCInside Backfill crawl

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scan-dcinside
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    environment: collection
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Verify D1 schema
        env:
          TC_CF_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
          TC_CF_DATABASE_ID: ${{ secrets.TC_CF_DATABASE_ID }}
          TC_CF_API_TOKEN: ${{ secrets.TC_CF_API_TOKEN }}
        run: python -m crawler.jobs.check_schema

      - name: Run Backfill crawl
        env:
          TC_CF_ACCOUNT_ID: ${{ secrets.TC_CF_ACCOUNT_ID }}
          TC_CF_DATABASE_ID: ${{ secrets.TC_CF_DATABASE_ID }}
          TC_CF_API_TOKEN: ${{ secrets.TC_CF_API_TOKEN }}
          TC_PERSIST: "1"
          TC_FINALIZATION_AGE_HOURS: "12"
          TC_HOT_LOOKBACK_MINUTES: "180"
          TC_HOT_MAX_SECONDS: "180"
          TC_CYCLE_MAX_SECONDS: "600"
          TC_REQUEST_INTERVAL_SECONDS: "10"
          TC_DEEP_RESERVED_SECONDS: "300"
          TC_BLOCK_COOLDOWN_HOURS: "6"
          TC_TRANSIENT_FETCH_ATTEMPTS: "2"
        run: python -m crawler.jobs.run_cycle --mode backfill --target dcinside-singularity --persist
